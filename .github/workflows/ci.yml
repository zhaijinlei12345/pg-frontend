name: CI - pg-frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: TypeScript check
        run: npx tsc -b

      - name: Build
        run: npm run build

      - name: Check build output
        run: |
          if [ -d dist ]; then
            echo "✅ Build successful ($(du -sh dist | cut -f1))"
          else
            echo "❌ Build failed"
            exit 1
          fi
